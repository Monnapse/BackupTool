services:
  backuptool:
    build: .
    # Or use a prebuilt image once you publish one:
    # image: ghcr.io/youruser/backuptool:latest
    container_name: backuptool
    restart: unless-stopped

    # ── Built-in automount (headless hosts) ─────────────────────────────────
    # Servers don't auto-mount USB sticks / SD cards like desktops do. With
    # these three settings BackupTool mounts removable drives itself the
    # moment they're plugged in — nothing to install on the host.
    # (Set AUTOMOUNT=0 in the environment to turn the behaviour off.)
    cap_add:
      - SYS_ADMIN            # permission to mount filesystems
    security_opt:
      - apparmor:unconfined  # Docker's default AppArmor profile blocks mount
    device_cgroup_rules:
      - "b *:* rmw"          # access to hot-plugged block devices
    # Change the port by setting PORT in your .env (default 8723).
    ports:
      - "${PORT:-8723}:${PORT:-8723}"
    environment:
      PORT: ${PORT:-8723}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-please}
      APP_SECRET: ${APP_SECRET:-please-generate-a-long-random-secret}
      DATA_DIR: /data
      BACKUP_DIR: /backups
      DOCKER_SOCKET: /var/run/docker.sock
      APP_URL: ${APP_URL:-http://localhost:8723}
      # Optional cloud OAuth (leave blank to disable)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DROPBOX_CLIENT_ID: ${DROPBOX_CLIENT_ID:-}
      DROPBOX_CLIENT_SECRET: ${DROPBOX_CLIENT_SECRET:-}
    volumes:
      # Lets BackupTool see and exec into your other containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persists the config database across restarts.
      - backuptool-data:/data
      # A default backup folder (lives on the host's internal disk).
      - ./backups:/backups

      # ── Auto-scan drives (Linux host) ──────────────────────────────────────
      # Mount the parent dirs where drives get mounted, with "rslave"
      # propagation so USB sticks / SD cards / microSD cards plugged in LATER
      # appear automatically in the picker — no per-drive config. Desktop
      # distros auto-mount under /media or /run/media; manual mounts usually
      # live under /mnt.
      - /media:/media:rslave
      - /run/media:/run/media:rslave
      - /mnt:/mnt:rslave
      # Device nodes, so the built-in automounter can see hot-plugged
      # USB sticks and SD cards and mount them itself.
      - /dev:/dev
      #
      # Plug the card into THIS Linux host, not your PC. If the host already
      # auto-mounts drives (desktop distros via udisks2), that still works too
      # — the automounter only touches drives nothing else has mounted.

volumes:
  backuptool-data:
