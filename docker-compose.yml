services:
  backuptool:
    build: .
    # Or use a prebuilt image once you publish one:
    # image: ghcr.io/youruser/backuptool:latest
    container_name: backuptool
    restart: unless-stopped
    # Change the port by setting PORT in your .env (default 8723).
    ports:
      - "${PORT:-8723}:${PORT:-8723}"
    environment:
      PORT: ${PORT:-8723}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-please}
      APP_SECRET: ${APP_SECRET:-please-generate-a-long-random-secret}
      DATA_DIR: /data
      BACKUP_DIR: /backups
      DOCKER_SOCKET: /var/run/docker.sock
      APP_URL: ${APP_URL:-http://localhost:8723}
      # Optional cloud OAuth (leave blank to disable)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DROPBOX_CLIENT_ID: ${DROPBOX_CLIENT_ID:-}
      DROPBOX_CLIENT_SECRET: ${DROPBOX_CLIENT_SECRET:-}
    volumes:
      # Lets BackupTool see and exec into your other containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persists the config database across restarts.
      - backuptool-data:/data
      # A default backup folder.
      - ./backups:/backups
      # --- Make your drives show up in the in-app drive picker ---
      # Mount whatever disks/SD cards you want to back up to (read-write).
      # On Linux, removable drives auto-mount under /media or /run/media, so
      # mounting those parents makes SD cards/USB appear automatically:
      # - /media:/media
      # - /run/media:/run/media
      # - /mnt:/mnt
      # Or mount a specific drive directly:
      # - /mnt/sdcard:/mnt/sdcard          # Linux
      # - D:/backups:/mnt/d                 # Windows host folder

volumes:
  backuptool-data:
