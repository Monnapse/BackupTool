services:
  backuptool:
    build: .
    # Or use a prebuilt image once you publish one:
    # image: ghcr.io/youruser/backuptool:latest
    container_name: backuptool
    restart: unless-stopped
    # Change the port by setting PORT in your .env (default 8723).
    ports:
      - "${PORT:-8723}:${PORT:-8723}"
    environment:
      PORT: ${PORT:-8723}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-please}
      APP_SECRET: ${APP_SECRET:-please-generate-a-long-random-secret}
      DATA_DIR: /data
      BACKUP_DIR: /backups
      DOCKER_SOCKET: /var/run/docker.sock
      APP_URL: ${APP_URL:-http://localhost:8723}
      # Optional cloud OAuth (leave blank to disable)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DROPBOX_CLIENT_ID: ${DROPBOX_CLIENT_ID:-}
      DROPBOX_CLIENT_SECRET: ${DROPBOX_CLIENT_SECRET:-}
    volumes:
      # Lets BackupTool see and exec into your other containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persists the config database across restarts.
      - backuptool-data:/data
      # A default backup folder (lives on the host's internal disk).
      - ./backups:/backups

      # ── Auto-scan drives (Linux host) ──────────────────────────────────────
      # Mount the parent dir where the host auto-mounts removable drives, with
      # "rslave" propagation so drives plugged in LATER appear automatically in
      # the picker — no per-drive config. Most distros use /media or /run/media.
      - /media:/media:rslave
      - /run/media:/run/media:rslave
      #
      # The host itself must auto-mount the drive (desktop distros do this via
      # udisks2; on a headless server install `udiskie` or `usbmount`, or mount
      # it manually). Plug the SD card into THIS Linux host, not your PC.
      #
      # Alternatively, pin specific drives explicitly:
      #   - /mnt/sdcard:/mnt/sdcard:rslave

volumes:
  backuptool-data:
